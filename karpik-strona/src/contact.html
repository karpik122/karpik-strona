<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt - Portfolio Graficzne</title>
  <meta name="description" content="Skontaktuj się ze mną poprzez formularz kontaktowy lub bezpośrednio przez e-mail." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="floating-bar">
    <nav class="top-nav">
      <a href="index.html">Strona główna</a>
      <a href="gallery-art.html">Galeria Sztuki</a>
      <a href="cv.html">CV</a>
      <a href="contact.html">Kontakt</a>
    </nav>
  </div>

  <main>
    <section class="contact-section">
      <div class="section__heading">
        <p class="eyebrow">Kontakt</p>
        <h2>Chcesz się ze mną skontaktować?</h2>
      </div>
      <article class="contact-card">
        <p class="contact-info">
          Możesz napisać do mnie maila na adres:
          <a href="mailto:karpik1771@gmail.com">karpik1771@gmail.com</a>
        </p>
        <form action="#" method="post" class="contact-form">
          <label for="name">Imię:</label>
          <input type="text" id="name" name="name" required />

          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required />

          <label for="message">Wiadomość:</label>
          <textarea id="message" name="message" rows="4" required></textarea>

          <button type="submit" class="btn btn--primary">Wyślij wiadomość</button>
        </form>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Patryk Karpiński — portfolio graficzne</p>
  </footer>
</body>
</html>
