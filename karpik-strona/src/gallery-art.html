<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria Sztuki - Portfolio Graficzne</title>
  <meta name="description" content="Galeria sztuki z projektami artystycznymi Patryka Karpińskiego." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__content">
      <h1>Galeria Sztuki</h1>
      <p class="lead">
        Oto moje projekty artystyczne, które łączą kreatywność i pasję do grafiki.
      </p>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="section__heading">
        <h2>Moje Prace Artystyczne</h2>
      </div>
      <div class="gallery-grid">
        <figure class="project-card gallery-item" data-src="images/artwork1.jpg" data-alt="Projekt artystyczny 1">
          <img src="images/artwork1.jpg" alt="Projekt artystyczny 1" width="640" height="420" loading="lazy" decoding="async" />
          <figcaption>Projekt artystyczny #1</figcaption>
        </figure>
        <figure class="project-card gallery-item" data-src="images/artwork2.jpg" data-alt="Projekt artystyczny 2">
          <img src="images/artwork2.jpg" alt="Projekt artystyczny 2" width="640" height="420" loading="lazy" decoding="async" />
          <figcaption>Projekt artystyczny #2</figcaption>
        </figure>
        <figure class="project-card gallery-item" data-src="images/artwork3.jpg" data-alt="Projekt artystyczny 3">
          <img src="images/artwork3.jpg" alt="Projekt artystyczny 3" width="640" height="420" loading="lazy" decoding="async" />
          <figcaption>Projekt artystyczny #3</figcaption>
        </figure>
        <figure class="project-card gallery-item" data-src="images/artwork4.jpg" data-alt="Projekt artystyczny 4">
          <img src="images/artwork4.jpg" alt="Projekt artystyczny 4" width="640" height="420" loading="lazy" decoding="async" />
          <figcaption>Projekt artystyczny #4</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Patryk Karpiński — portfolio graficzne</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
